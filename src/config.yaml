site:
  name: cc-deck
  site: 'https://cc-deck.github.io'
  base: '/'
  trailingSlash: false

# Default SEO metadata
metadata:
  title:
    default: cc-deck
    template: '%s | cc-deck'
  description: 'The TweetDeck for Claude Code. Manage in one place, run anywhere.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: cc-deck
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: false

analytics:
  vendors:
    googleAnalytics:
      id: null

ui:
  theme: 'dark'

site:
  name: cc-deck
  site: 'https://rhuss.github.io/cc-deck.github.io'
  base: '/'
  trailingSlash: false

# Default SEO metadata
metadata:
  title:
    default: cc-deck
    template: '%s | cc-deck'
  description: 'Your Claude Code command center. Zellij sidebar plugin for session management, custom container images, and multi-platform deployment.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: cc-deck
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: false

analytics:
  vendors:
    googleAnalytics:
      id: null

ui:
  theme: 'dark'
